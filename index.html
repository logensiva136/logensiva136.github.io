<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Mobile Camera Capture</title>
	<style>
		#container {
			position: relative;
		}

		#video {
			width: 100%;
			height: auto;
			transform: scaleX(-1);
			/* Flip the video horizontally */
			z-index: 1;
		}

		#overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-color: rgba(0, 0, 0, 0);
			z-index: 1;
			display: none;
		}

		#capture {
			position: absolute;
			bottom: 20px;
			left: 50%;
			transform: translateX(-50%);
			padding: 10px 20px;
			font-size: 24px;
			background-color: #4CAF50;
			color: white;
			border: none;
			cursor: pointer;
			border-radius: 10px;
			box-shadow: 0 0 5px 1px rgba(0, 0, 0, 0.2);
			z-index: 2;
		}

		#screenshot {
			display: none;
		}

		#box {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 80%;
			height: 60%;
			border: 2px solid white;
			border-radius: 10px;
			overflow: hidden;
			box-shadow: 0 0 10px 5px rgba(0, 0, 0, 0.2);
			z-index: 2;
			background-color: rgba(0, 0, 0, 0);
		}
	</style>
</head>

<body>
	<div id="boleh">
		<h1>Mobile Camera Capture</h1>
		<div id="container">
			<video id="video" autoplay></video>
			<div id="box"></div>
			<div id="overlay"></div>
		</div>
		<button id="capture">Capture Screenshot</button>
		<canvas id="canvas" style="display: none;background-color: #4CAF50;"></canvas>
		<img id="screenshot" style="display: none;background-color: #4CAF50;">
	</div>
	<div id="takboleh">
		<h1>Please rotate your device to proceed.</h1>
	</div>
	<script>


		function checkScreenOrientation() {
			if (window.matchMedia("(orientation: landscape)").matches) {

				// Get the video element and start the camera stream
				var video = document.getElementById("video");
				navigator.mediaDevices.getUserMedia({
					video: {
						facingMode: "environment"
					}
				})
					.then(function (stream) {
						video.srcObject = stream;
					})
					.catch(function (err) {
						console.log("An error occurred: " + err);
					});

				// Get the capture button and canvas element
				var captureButton = document.getElementById("capture");
				var canvas = document.getElementById("canvas");
				var context = canvas.getContext("2d");

				// When the capture button is clicked or touched, take a screenshot of the video
				captureButton.addEventListener("click", captureScreenshot);
				captureButton.addEventListener("touchend", captureScreenshot);

				function captureScreenshot() {
					context.drawImage(video, 0, 0, canvas.width, canvas.height);
					document.getElementById("screenshot").src = canvas.toDataURL("image/png");
					// document.getElementById("screenshot").style.display = "inline-block";
				}

				// When the video starts playing, show the overlay
				video.addEventListener("playing", function () {
					document.getElementById("overlay").style.display = "block";
				});
				document.getElementById("takboleh").style.display = "none";
				document.getElementById("boleh").style.display = "block";
			} else {
				alert("Screen is in portrait orientation. Please rotate your device.");
				document.getElementById("takboleh").style.display = "block";
				document.getElementById("boleh").style.display = "none";
			}
		}

		// Check initial screen orientation
		checkScreenOrientation();

		// Add event listener to detect orientation change
		window.addEventListener("orientationchange", checkScreenOrientation);
	</script>
</body>

</html>
