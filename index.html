<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<style>
  * {
    margin:0;
    padding:0;
  }

  #video-container {
      position: relative;
      width: 100%;
    }

    /* #overlay {
      position: absolute;
      top: 0;

      width: 100%;

      background-color: rgba(0, 0, 0, 0.5);
      pointer-events: none;
    } */

    #rectangle {
      position: absolute;
      top: 20%;
      left: 20%;
      width: 60%;
      height: 40%;
      border: 5px solid white;
      border-radius: 20px;
      pointer-events: none;
    }
</style>
</head>

<body>
  <div class="container-fluid p-0 m-0">
    <div class="row p-0 m-0">
      <div class="col-12 text-center p-0 m-0">
          <video id="video" class="mx-auto" 
          <!-- style="min-height: 100vh;max-width: 100vw;" -->
           autoplay></video>
        <div id="overlay">
          <div id="rectangle"></div>
        </div>
        <canvas id="canvas" class="d-none">logen</canvas>
      </div>
      <!-- <button class="position-absolute bottom-0 mb-5 start-50 btn btn-secondary btn-lg w-auto"><i class="bi bi-camera-fill"></i></button> -->
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const video = document.getElementById('video')
    const canvas = document.getElementById('canvas')
    navigator.mediaDevices.getUserMedia({
      video: true
    }).then(stream => {
      video.srcObject = stream
      video.play()
    })
    navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        facingMode: "environment",
      },
    }).then((stream) => {
      video.srcObject = stream;
    }).catch((err) => {
      console.log(err);
    })


  </script>
</body>

</html>
